<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 10%, #13264f 0%, #060a14 45%);
        color: #e6eeff;
        font-family: Sora, Segoe UI, sans-serif;
      }
      .card {
        width: min(420px, 92vw);
        border: 1px solid #2f4f88;
        border-radius: 14px;
        background: rgba(12, 18, 34, 0.94);
        padding: 18px;
      }
      h1 { margin: 0 0 8px; font-size: 1.2rem; }
      p { margin: 0 0 14px; color: #93a9d5; font-size: 0.9rem; }
      label { font-size: 0.82rem; color: #99afdc; display: block; margin-bottom: 6px; }
      input {
        width: 100%;
        border: 1px solid #3a5f9f;
        border-radius: 9px;
        background: #0a1122;
        color: #e6eeff;
        padding: 10px 11px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        margin-top: 10px;
        border: 1px solid #436fb7;
        border-radius: 9px;
        background: linear-gradient(135deg, #27f2ff 0%, #70ffad 100%);
        color: #00131f;
        font-weight: 700;
        padding: 10px 11px;
        cursor: pointer;
      }
      .msg { min-height: 1.2em; margin-top: 10px; font-size: 0.84rem; color: #93a9d5; }
      .err { color: #ff7099; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Panel Admin</h1>
      <p>Wpisz haslo, aby wejsc do dashboardu.</p>
      <form id="login-form">
        <label for="pass-input">Haslo</label>
        <input id="pass-input" type="password" required />
        <button id="login-btn" type="submit">Wejdz</button>
      </form>
      <div id="msg" class="msg"></div>
    </main>
    <script src="/static/admin-login.js?v=20260307a"></script>
  </body>
</html>
